name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          enable-cache: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"
      - run: uv sync --all-extras
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run python -m compileall -q src tests
      - run: uv run pytest
      - run: uv run ccr schema validate --kind packet --file examples/minimal/packet.json
      - run: uv run ccr schema validate --kind task --file examples/minimal/task.json
      - run: uv run ccr schema validate --kind packet --file examples/phase_formation/packets/checked/packet.phase.seed.json
      - run: uv run ccr schema validate --kind packet --file examples/phase_formation/packets/checked/packet.phase.integrator.json
      - run: uv run ccr schema validate --kind packet --file examples/phase_formation/packets/candidate/packet.phase.duplicate.json
      - run: uv run ccr schema validate --kind baseline --file examples/phase_formation/baseline.json
      - run: uv run ccr schema validate --kind asi-proxy-threshold --file examples/phase_formation/threshold.json
      - run: uv run ccr schema validate --kind trc-operation-plan --file examples/asi_proxy_benchmark_bundle/trc_operation_plan.json
      - run: cp -R examples/phase_formation /tmp/ccr-phase-formation && uv run ccr --root /tmp/ccr-phase-formation phase form --profile development --json
      - run: uv run ccr audit repo --json
      - run: uv build
      - run: uv run ccr audit release --dist dist --json
      - run: uvx twine check dist/*
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: kadubon/percolation-inversion-compiler
          path: .tmp/pic-root
          persist-credentials: false
      - run: uv run ccr audit pic --pic-root .tmp/pic-root --json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/collective-capability-runtime
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
