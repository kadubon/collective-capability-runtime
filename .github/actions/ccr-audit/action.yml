name: CCR audit
description: Run Collective Capability Runtime static repository and release audits.
inputs:
  run-release-audit:
    description: Run ccr audit release after build artifacts exist.
    required: false
    default: "false"
  dist:
    description: Distribution directory for ccr audit release.
    required: false
    default: dist
runs:
  using: composite
  steps:
    - name: Install CCR
      shell: bash
      run: python -m pip install collective-capability-runtime
    - name: Repository audit
      shell: bash
      run: ccr audit repo --json
    - name: Release audit
      if: ${{ inputs.run-release-audit == 'true' }}
      shell: bash
      run: ccr audit release --dist "${{ inputs.dist }}" --json
